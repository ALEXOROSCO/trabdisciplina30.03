name: Continuous Integration
on:
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4


      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install flake8
        run: pip install flake8

      - name: Run Lint
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Pyton Lint Code Scanning Action
        uses: advanced-security/pyton-lint-code-scanning-action@v1.1.1
        with:
          linter: pylint
          main
